<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой первый сайт</title>
    
    <style>
        /* ===== CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 2rem;
            padding: 3rem 4rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 20, 80, 0.15);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 2.8rem;
            color: #1a2639;
            margin-bottom: 0.5rem;
        }

        .highlight {
            color: #3b82f6;
        }

        p {
            color: #475569;
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.8rem 2.2rem;
            font-size: 1.2rem;
            border-radius: 3rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }

        .btn:hover {
            background: #2563eb;
        }

        .btn:active {
            transform: scale(0.96);
        }

        #counter {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin: 1rem 0 0.5rem 0;
        }

        .footer {
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Привет, <span class="highlight">мир</span>! 👋</h1>
        <p>Это простейший одностраничный сайт! Проверка!!!<br />в одном HTML-файле.</p>
        
        <!-- Счётчик кликов (интерактив) -->
        <div id="counter">0</div>
        <button class="btn" id="clickBtn">Нажми меня</button>

        <div class="footer">
            Сделано с ❤️ на GitHub · 
            <a href="#" onclick="alert('Сайт работает локально!')">О проекте</a>
        </div>
    </div>

    <script>
        // ===== JavaScript =====
        let count = 0;
        const counterEl = document.getElementById('counter');
        const btn = document.getElementById('clickBtn');

        btn.addEventListener('click', function() {
            count++;
            counterEl.textContent = count;
            
            // Небольшая анимация (мигание) при клике
            counterEl.style.transition = 'transform 0.1s';
            counterEl.style.transform = 'scale(1.3)';
            setTimeout(() => {
                counterEl.style.transform = 'scale(1)';
            }, 150);
        });

        // Приветствие в консоли (для разработчиков)
        console.log('✅ Страница загружена! Начинайте разработку.');
    </script>

</body>
</html>
